
<!DOCTYPE html>

<title data-i18n="page_title">Product Orders - Deal Way</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script defer src="https://sdk.minepi.com/pi-sdk.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

<style>
/* --- التصميم الأساسي --- */
:root {
  --primary: #6366F1; --primary-dark: #4F46E5; --primary-light: #818CF8;
  --accent: #F59E0B; --bg-body: #F8FAFC; --surface: #FFFFFF;
  --text-main: #0F172A; --text-muted: #64748B; --success: #10B981;
  --danger: #EF4444; --border: #E2E8F0; --radius-lg: 16px; --radius-xl: 24px;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Tajawal', sans-serif; background: var(--bg-body); color: var(--text-main); line-height: 1.6; padding-bottom: 40px; }
.container { width: min(100%, 800px); margin: 0 auto; padding: 16px; }

/* الأزرار والهيدر */
.btn { border: none; cursor: pointer; border-radius: var(--radius-lg); padding: 12px 20px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; transition: all 0.3s; font-size: 14px;}
.btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; }
.btn-success { background: linear-gradient(135deg, var(--success) 0%, #059669 100%); color: white; }
.btn-ghost { background: white; border: 1px solid var(--border); color: var(--text-muted); }
.btn-red { background: var(--danger); color: white; } 

.header { background: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow-sm);}
.back-btn { background: none; border: none; font-size: 20px; color: var(--text-main); cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 800; font-family: inherit;}

/* زر اللغة */
.lang-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: white; border: 1px solid var(--border);
  color: var(--primary); font-weight: 800; font-size: 12px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  transition: border-color 0.2s, background-color 0.2s;
}
.lang-btn:hover { border-color: var(--primary); background-color: #F8FAFC; }

/* بطاقة الطلب (Order Card) */
.order-card { background: white; border-radius: var(--radius-xl); border: 1px solid var(--border); margin-bottom: 16px; overflow: hidden; box-shadow: var(--shadow-sm); transition: transform 0.3s; }
.order-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
.order-header { background: #F8FAFC; padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; color: var(--text-muted); }
.order-body { padding: 16px; }
.buyer-info { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px dashed var(--border); }
.buyer-avatar { width: 40px; height: 40px; background: var(--primary-light); color: white; border-radius: 50%; display: grid; place-items: center; font-weight: 800; }
.status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; }
.status-PENDING { background: #F1F5F9; color: #64748B; }
.status-FUNDED { background: #FEF3C7; color: #D97706; }
.status-SHIPPED { background: #E0E7FF; color: var(--primary-dark); }
.status-COMPLETED { background: #D1FAE5; color: #059669; }
.status-CANCELLED { background: #FEE2E2; color: #991B1B; } /* إضافة ستايل الملغي */

.order-actions { padding: 16px; background: #F8FAFC; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; align-items: center; flex-wrap: wrap;}

/* رسائل الخطأ أو التحميل */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state i { font-size: 48px; margin-bottom: 16px; color: var(--border); }

/* --- تصميم النوافذ المنبثقة (Modal) --- */
.modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 2000; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(8px); animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.sheet { background: white; width: 100%; max-width: 600px; border-radius: var(--radius-xl) var(--radius-xl) 0 0; padding: 20px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
.close-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--bg-body); color: var(--text-muted); cursor: pointer; display: grid; place-items: center; font-size: 20px; transition: all 0.3s ease; }
.close-btn:hover { background: var(--danger); color: white; transform: rotate(90deg); }

/* Chat Styles */
.chat-area { flex: 1; overflow-y: auto; background: #F8FAFC; padding: 16px; border-radius: var(--radius-lg); margin-bottom: 16px; min-height: 350px; max-height: 50vh; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border); scroll-behavior: smooth; }
.bubble { max-width: 80%; padding: 14px 18px; border-radius: 20px; font-size: 14px; line-height: 1.5; position: relative; animation: slideInUp 0.3s ease; word-wrap: break-word; }
@keyframes slideInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.bubble.me { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.bubble.other { background: white; border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; color: var(--text-main); }
.chat-img-msg { max-width: 100%; border-radius: 8px; margin-top: 4px; cursor: pointer; }

/* Chat Inputs & Preview */
.chat-input-group { display: flex; gap: 8px; align-items: center; }
.chat-input { flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-lg); font-family: inherit; font-size: 15px; outline: none; background: white; }
.chat-input:focus { border-color: var(--primary); }
.send-btn { width: 50px; height: 50px; border-radius: var(--radius-lg); padding: 0; flex-shrink: 0; background: var(--primary); color: white; border: none; font-size: 18px; cursor: pointer; }
.attach-btn { background: white; color: var(--text-muted); border: 1px solid var(--border); width: 50px; height: 50px; border-radius: var(--radius-lg); cursor: pointer; font-size: 18px; flex-shrink: 0; transition: 0.2s; }
.attach-btn:hover { background: #F1F5F9; color: var(--primary); border-color: var(--primary); }

.chat-preview-container { display: none; padding: 8px; background: #E2E8F0; border-radius: var(--radius-lg); margin-bottom: 10px; position: relative; width: max-content; border: 1px solid var(--border); }
.chat-preview-container img { max-height: 80px; border-radius: 8px; display: block; }
.chat-preview-remove { position: absolute; top: -8px; inset-inline-end: -8px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); }

.input-label { display: block; font-weight: 800; margin-bottom: 8px; color: var(--text-main); font-size: 14px; }
textarea.input-box { height: 100px; resize: none; margin-bottom: 16px; }

/* Upload Area (Disputes) */
.upload-area { border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: 20px; text-align: center; cursor: pointer; background: #F8FAFC; transition: 0.3s; margin-bottom: 16px; }
.upload-area:hover { border-color: var(--primary); background: #F5F3FF; }
.preview-container { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 16px; }
.preview-box { position: relative; width: 60px; height: 60px; flex-shrink: 0; border-radius: 8px; border: 1px solid var(--border); }
.preview-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
.preview-box button { position: absolute; top: -5px; inset-inline-end: -5px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; cursor: pointer; }
</style>
</head>
<body>

<header class="header">
  <button class="back-btn" onclick="window.location.href='index.html'">
    <i class="fa-solid fa-arrow-left" id="back-icon"></i> <span data-i18n="seller_dashboard">Seller Dashboard</span>
  </button>
  <button class="lang-btn" onclick="toggleLanguage()">
    <span id="langText">AR</span>
  </button>
</header>

<div class="container">
  <h2 style="margin-bottom: 20px; font-size: 20px; color: var(--text-main);">

  </h2>

  <div id="orders-container">
    <div class="empty-state">
      <i class="fa-solid fa-circle-notch fa-spin" style="color: var(--primary);"></i>

</div>

<div id="chatModal" class="modal" onclick="if(event.target==this) closeChat()">
  <div class="sheet">
    <div class="chat-header">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div style="width: 45px; height: 45px; background: var(--primary); border-radius: 50%; color: white; display: grid; place-items: center; font-size: 18px;"><i class="fa-solid fa-user"></i></div>
        <div>
          <div style="font-weight: 800; font-size: 16px;" data-i18n="buyer">Buyer</div>
          <div style="font-size: 12px; color: var(--text-muted); font-family: monospace;" id="chat-buyer-id">...</div>
        </div>
      </div>
      <button onclick="closeChat()" class="close-btn">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    
    <div id="msgContainer" class="chat-area"></div>
    
    <div id="chatPreviewContainer" class="chat-preview-container">
        <img id="chatPreviewImg" src="" alt="preview">

    <div class="input-group">
      <input type="file" id="chatImgInput" accept="image/*" style="display:none;" onchange="handleChatImageSelection(this)">

      <input id="msgInput" class="input-box" style="border-radius: var(--radius-full);" placeholder="Type a message to buyer..." />
      <button class="send-btn" id="chatSendBtn" onclick="sendMsg()">
        <i class="fa-solid fa-paper-plane"></i>
      </button>

  </div>
</div>

<div id="disputeModal" class="modal" onclick="if(event.target==this) closeDisputeModal()">
  <div class="sheet">
    <div class="modal-header">
      <h3 style="font-size: 18px; color: var(--danger); margin: 0;"><i class="fa-solid fa-scale-balanced"></i> <span data-i18n="dispute_title">Open Dispute</span></h3>
      <button onclick="closeDisputeModal()" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px;" data-i18n="dispute_desc">Please explain the issue. Site administration will review the transaction and messages.</p>

    <div style="background: #F3F4F6; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 13px;">
        <strong><span data-i18n="order_num">Order: #</span></strong> <span id="disp-order-id" style="font-family: monospace; color: var(--primary);">...</span><br>
        <strong><span data-i18n="product_label">Product:</span></strong> <span id="disp-prod-name">...</span>
    </div>

    <label class="input-label" data-i18n="dispute_reason_label">Reason for dispute:</label>
    <textarea id="disputeReason" class="input-box" placeholder="Explain what happened in detail..."></textarea>

    <label class="input-label" data-i18n="attach_images_label">Attach Evidence (Max 3 images):</label>
    <div class="upload-area" onclick="document.getElementById('disputeImgInput').click()">
        <i class="fa-solid fa-cloud-arrow-up" style="font-size: 24px; color: var(--primary);"></i>
        <div style="font-size: 12px; color: var(--text-muted); margin-top: 5px;" data-i18n="click_to_upload">Click to select images</div>
    </div>
    <input type="file" id="disputeImgInput" accept="image/*" multiple style="display:none" onchange="handleDisputeImages(this)">
    <div id="dispute-image-previews" class="preview-container"></div>

    <button id="submitDisputeBtn" class="btn btn-red" onclick="submitDispute()">
      <i class="fa-solid fa-paper-plane"></i> <span data-i18n="submit_dispute">Submit Dispute</span>
    </button>
  </div>
</div>

<script>
// --- Translations Setup ---
let currentLang = localStorage.getItem('lang') || 'en';

const translations = {
  en: {
    page_title: "Product Orders - Deal Way",
    seller_dashboard: "Seller Dashboard",
    product_orders: "Product Orders",
    loading_orders: "Fetching orders...",
    no_orders_title: "No orders yet",
    no_orders_desc: "No one has purchased this product via Escrow yet.",
    error_title: "Error occurred",
    error_desc: "Cannot load orders currently.",

    buyer_id: "Buyer ID:",

    status_pending: "Pending Payment",
    status_funded: "Funded (Ready to Ship)",

    action_ship: "Confirm Shipping",
    action_shipped: "Waiting for buyer confirmation...",
    action_completed: "Balance available",
    action_cancelled: "Cancelled by buyer",
    btn_message: "Message",
    buyer: "Buyer",
    chat_placeholder: "Type a message to buyer...",
    no_msgs: "No previous messages. Start chatting now!",
    confirm_ship: "Are you sure you shipped and delivered the product to the buyer?",
    updating: "Updating...",
    update_error: "Error updating status.",
    send_error: "Message not sent, check your connection.",
    missing_id: "Product ID is missing",

    // Dispute Translations
    btn_dispute: "Dispute",
    dispute_title: "Open Official Dispute",
    dispute_desc: "Please explain the issue. Site administration will review the transaction and messages to protect your rights.",
    product_label: "Product Name:",
    dispute_reason_label: "Reason for dispute:",
    ph_dispute_reason: "Explain what happened in detail...",
    attach_images_label: "Attach Evidence (Max 3 images):",
    click_to_upload: "Click to select images",
    submit_dispute: "Submit Dispute",
    empty_reason: "Please write the reason for the dispute.",
    dispute_success: "Dispute submitted successfully. Admin will review it shortly.",
    max_3_images: "Maximum 3 images allowed.",
    uploading_image: "Uploading image..."
  },
  ar: {
    page_title: "متابعة الطلبات - Deal Way",
    seller_dashboard: "لوحة تحكم البائع",
    product_orders: "طلبات المنتج",
    loading_orders: "جاري جلب الطلبات...",
    no_orders_title: "لا توجد طلبات حتى الآن",
    no_orders_desc: "لم يقم أي شخص بشراء هذا المنتج عبر الوسيط بعد.",
    error_title: "حدث خطأ",
    error_desc: "لا يمكن تحميل الطلبات حالياً.",
    order_num: "طلب: #",
    buyer_id: "معرف المشتري:",
    contact_hint: "تواصل معه لتحديد موعد/مكان التسليم.",
    net_profit: "أرباحك الصافية:",
    status_pending: "بانتظار الدفع",
    status_funded: "مُجمّد (جاهز للشحن)",
    status_shipped: "تم الشحن",
    status_completed: "مكتمل",
    status_cancelled: "ملغية",
    action_pending: "بانتظار الدفع...",
    action_ship: "تأكيد الشحن",
    action_shipped: "في انتظار تأكيد المشتري...",
    action_completed: "الرصيد متاح لك",
    action_cancelled: "تم الإلغاء من قبل المشتري",
    btn_message: "مراسلة",
    buyer: "المشتري",
    chat_placeholder: "اكتب رسالة للمشتري...",
    no_msgs: "لا توجد رسائل سابقة. ابدأ المحادثة الآن!",
    confirm_ship: "هل أنت متأكد أنك قمت بشحن المنتج وتسليمه للمشتري؟",
    updating: "جاري التحديث...",
    update_error: "حدث خطأ أثناء تحديث الحالة.",
    send_error: "لم يتم إرسال الرسالة، تأكد من اتصالك.",
    missing_id: "رقم المنتج مفقود",

    // Dispute Translations
    btn_dispute: "فتح نزاع",
    dispute_title: "فتح نزاع رسمي",
    dispute_desc: "يرجى توضيح المشكلة. ستقوم إدارة الموقع بمراجعة المعاملة والرسائل لحفظ الحقوق.",
    product_label: "اسم المنتج:",
    dispute_reason_label: "سبب النزاع والمشكلة:",
    ph_dispute_reason: "اشرح بالتفصيل ما حدث...",
    attach_images_label: "إرفاق أدلة وصور (حد أقصى 3):",
    click_to_upload: "اضغط لاختيار الصور",
    submit_dispute: "إرسال الشكوى",
    empty_reason: "يرجى كتابة سبب الشكوى أولاً.",
    dispute_success: "تم إرسال النزاع بنجاح. ستقوم الإدارة بمراجعته قريباً.",
    max_3_images: "الحد الأقصى 3 صور.",
    uploading_image: "جاري الرفع..."
  }
};

function t(key) {
    return translations[currentLang][key] || key;
}

function toggleLanguage() {
    currentLang = currentLang === 'en' ? 'ar' : 'en';
    localStorage.setItem('lang', currentLang);
    updateLanguageUI();
    if(currentUser) loadSellerOrders(); // Refresh table to translate dynamic content
}

function updateLanguageUI() {
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    
    document.getElementById('langText').innerText = currentLang === 'ar' ? 'EN' : 'AR';
    
    const backIcon = document.getElementById('back-icon');
    if (backIcon) {
        backIcon.className = currentLang === 'ar' ? 'fa-solid fa-arrow-right' : 'fa-solid fa-arrow-left';
    }

    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[currentLang][key]) {
            el.innerText = translations[currentLang][key];
        }
    });

    document.getElementById('msgInput').placeholder = t('chat_placeholder');
    document.getElementById('disputeReason').placeholder = t('ph_dispute_reason');
    document.title = t('page_title');
}


// --- App Config & Logic ---
const SUPABASE_URL = "https://ssvyxrtyvdxxojmunrcv.supabase.co";
const SUPABASE_KEY = "sb_publishable_8egOM2-lT9J6kPQTbluC4w_8YHtB4K3"; 
let sb;
let currentUser = null;
let currentChatBuyerId = null; 
let chatSubscription = null;
let globalProductName = "Loading...";

let disputeFiles = []; 
let chatSelectedImage = null; // الصورة المختارة للشات

const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('productId');

document.addEventListener("DOMContentLoaded", async () => {
  updateLanguageUI();
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  
  if(!productId) { 
    alert(t('missing_id')); 
    window.location.href = 'index.html'; 
    return; 
  }

  // جلب اسم المنتج مرة واحدة لغرض النزاع
  const { data: pData } = await sb.from("products").select("name").eq("id", productId).single();
  if(pData) globalProductName = pData.name;

  await initPiUser(); 
  await loadSellerOrders();
});

async function initPiUser() {
  try {
    if(typeof Pi !== 'undefined') {
        Pi.init({ version: "2.0", sandbox: false });
        const auth = await Pi.authenticate(["username", "payments"], (payment) => console.log(payment));
        currentUser = { uid: auth.user.uid, username: auth.user.username };
    }
  } catch(e) { console.log("Pi Login Failed", e); }

  if(!currentUser) {
      currentUser = { uid: "test_seller_123", username: "TestSeller" }; 
  }
}

async function loadSellerOrders() {
  const container = document.getElementById('orders-container');

  try {
    const { data: orders, error } = await sb.from("escrow_transactions")
      .select("*")
      .eq("product_id", productId)
      .eq("seller_pi_id", currentUser.uid)
      .order("created_at", { ascending: false });

    if (error) throw error;

    if (!orders || orders.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-box-open"></i>
          <h3>${t('no_orders_title')}</h3>
          <p>${t('no_orders_desc')}</p>
        </div>
      `;
      return;
    }

    container.innerHTML = "";
    orders.forEach(order => {
      container.innerHTML += renderOrderCard(order);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-triangle-exclamation" style="color: var(--danger);"></i>
        <h3>${t('error_title')}</h3>
        <p>${t('error_desc')}</p>
      </div>
    `;
  }
}

function renderOrderCard(order) {
  const dateLocale = currentLang === 'ar' ? 'ar-EG' : 'en-US';
  const dateStr = new Date(order.created_at).toLocaleDateString(dateLocale, { year: 'numeric', month: 'short', day: 'numeric' });
  
  let statusText = "";
  let statusIcon = "";
  let actionHtml = "";

  const marginEdge = currentLang === 'ar' ? 'margin-right: auto;' : 'margin-left: auto;';

  if(order.status === 'PENDING') {
      statusText = t('status_pending');
      statusIcon = "fa-clock";
      actionHtml = `<span style="color: var(--text-muted); font-size: 13px; margin-inline-start: auto;">${t('action_pending')}</span>`;
  } else if(order.status === 'FUNDED') {
      statusText = t('status_funded');
      statusIcon = "fa-lock";
      actionHtml = `<button onclick="updateOrderStatus('${order.id}', 'SHIPPED')" class="btn btn-primary" style="margin-inline-start: auto;"><i class="fa-solid fa-truck-fast"></i> ${t('action_ship')}</button>`;
  } else if(order.status === 'SHIPPED') {
      statusText = t('status_shipped');
      statusIcon = "fa-truck-fast";
      actionHtml = `<span style="color: var(--text-muted); font-size: 13px; margin-inline-start: auto;">${t('action_shipped')}</span>`;
  } else if(order.status === 'COMPLETED') {
      statusText = t('status_completed');
      statusIcon = "fa-check-double";
      actionHtml = `<button class="btn btn-ghost" style="margin-inline-start: auto;" disabled><i class="fa-solid fa-check"></i> ${t('action_completed')}</button>`;
  } else if(order.status === 'CANCELLED') {
      statusText = t('status_cancelled');
      statusIcon = "fa-ban";
      actionHtml = `<span style="color: var(--danger); font-size: 13px; margin-inline-start: auto; font-weight: bold;"><i class="fa-solid fa-circle-info"></i> ${t('action_cancelled')}</span>`;
  }

  const shortBuyerId = order.buyer_pi_id.substring(0, 8) + "...";
  const sellerNetAmount = parseFloat(order.amount).toFixed(2);

  // إخفاء الأرباح لو كانت الصفقة ملغية
  let profitHtml = `<span style="color: var(--success);">${sellerNetAmount} π</span>`;
  if (order.status === 'CANCELLED') {
      profitHtml = `<span style="color: var(--text-muted); text-decoration: line-through; font-size: 14px;">${sellerNetAmount} π</span> <span style="color: var(--danger); font-size: 14px;">0.00 π</span>`;
  }

  return `
    <div class="order-card" id="order-${order.id}">
      <div class="order-header">
        <span>${t('order_num')}${order.id.substring(0, 6).toUpperCase()}</span>
        <span>${dateStr}</span>
      </div>
      <div class="order-body">
        <div class="buyer-info">
          <div class="buyer-avatar"><i class="fa-solid fa-user"></i></div>
          <div>
            <div style="font-size: 14px; font-weight: 800;">${t('buyer_id')} <span style="font-family: monospace; color: var(--primary);">${shortBuyerId}</span></div>
            <div style="font-size: 12px; color: var(--text-muted);">${t('contact_hint')}</div>
          </div>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div style="font-size: 16px; font-weight: 800; color: var(--text-main);">
            ${t('net_profit')} ${profitHtml}
          </div>
          <div class="status-badge status-${order.status}">
            <i class="fa-solid ${statusIcon}"></i> ${statusText}
          </div>
        </div>
      </div>
      <div class="order-actions">
        <button onclick="openDisputeModal('${order.id}', '${order.buyer_pi_id}')" class="btn btn-ghost" style="padding: 10px 16px; color: var(--danger); border-color: #FECACA; margin-inline-end: auto;">
           <i class="fa-solid fa-scale-balanced"></i> ${t('btn_dispute')}
        </button>

        <button onclick="openChat('${order.buyer_pi_id}')" class="btn btn-ghost" style="padding: 10px 16px;">
           <i class="fa-solid fa-comment-dots" style="color: var(--primary);"></i> ${t('btn_message')}
        </button>
        ${actionHtml}
      </div>
    </div>
  `;
}

async function updateOrderStatus(orderId, newStatus) {
  if(!confirm(t('confirm_ship'))) return;

  try {
    const btn = document.querySelector(`#order-${orderId} .btn-primary`);
    if(btn) btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> ${t('updating')}`;

    const { error } = await sb.from('escrow_transactions')
      .update({ status: newStatus })
      .eq('id', orderId);

    if (error) throw error;
    await loadSellerOrders();

  } catch (err) {
    console.error(err);
    alert(t('update_error'));
    await loadSellerOrders(); 
  }
}

// ==========================================
// وظائف الشات المباشر (Realtime & Image Upload)
// ==========================================

function openChat(buyerId) {
    currentChatBuyerId = buyerId;
    document.getElementById("chat-buyer-id").innerText = buyerId.substring(0, 12) + "...";
    document.getElementById("chatModal").style.display = "flex";
    document.getElementById("msgContainer").innerHTML = "";
    
    clearChatPreview();
    loadMessages();
    subscribeToChat();
}

function closeChat() {
    document.getElementById("chatModal").style.display = "none";
    currentChatBuyerId = null;
    clearChatPreview();
    if(chatSubscription) {
        sb.removeChannel(chatSubscription);
        chatSubscription = null;
    }
}

// معاينة صورة الشات
function handleChatImageSelection(input) {
    if(input.files && input.files[0]) {
        chatSelectedImage = input.files[0];
        const url = URL.createObjectURL(chatSelectedImage);
        document.getElementById('chatPreviewImg').src = url;
        document.getElementById('chatPreviewContainer').style.display = 'block';
    }
    input.value = ""; // لكي يستطيع المستخدم اختيار نفس الصورة لو مسحها ورجع
}

function clearChatPreview() {
    chatSelectedImage = null;
    document.getElementById('chatPreviewImg').src = '';
    document.getElementById('chatPreviewContainer').style.display = 'none';
}

async function loadMessages() {
  if(!currentChatBuyerId) return;
  const box = document.getElementById("msgContainer");
  box.innerHTML = `<div style="text-align:center; padding:20px;"><i class="fa-solid fa-circle-notch fa-spin" style="color:var(--primary);"></i></div>`;
  
  const { data, error } = await sb.from("messages")
    .select("*")
    .eq("product_id", productId)
    .or(`and(sender_pi_id.eq.${currentUser.uid},receiver_pi_id.eq.${currentChatBuyerId}),and(sender_pi_id.eq.${currentChatBuyerId},receiver_pi_id.eq.${currentUser.uid})`)
    .order("created_at", { ascending: true });
    
  box.innerHTML = "";
  if(error) {
      console.error(error);
      return;
  }
  
  if(data && data.length > 0) {
    data.forEach(m => renderMsg(m));
  } else {
    box.innerHTML = `<div style="text-align:center; color:var(--text-light); font-size:13px; margin-top:20px;">${t('no_msgs')}</div>`;
  }
}

function renderMsg(m){
    const div = document.createElement("div"); 
    const isMe = m.sender_pi_id === currentUser.uid;
    div.className = `bubble ${isMe ? 'me' : 'other'}`; 
    
    let imgHtml = m.image_url ? `<img src="${m.image_url}" class="chat-img-msg" onclick="window.open('${m.image_url}')">` : '';
    let textHtml = (m.content && m.content !== "📷 Image") ? `<div>${m.content}</div>` : '';
    
    div.innerHTML = `${textHtml}${imgHtml}`;
    
    const box = document.getElementById("msgContainer"); 
    if(box.innerHTML.includes(t('no_msgs'))) box.innerHTML = "";
    
    box.appendChild(div); 
    box.scrollTop = box.scrollHeight;
}

async function sendMsg() {
    const inp = document.getElementById("msgInput"); 
    const text = inp.value.trim();
    
    if(!text && !chatSelectedImage) return; // لا نص ولا صورة
    if(!currentChatBuyerId) return;
    
    const btn = document.getElementById('chatSendBtn');
    const origHTML = btn.innerHTML;

    // 1. إذا كان نص فقط (إرسال فوري Optimistic UI)
    if(!chatSelectedImage) {
        inp.value = "";
        renderMsg({ sender_pi_id: currentUser.uid, content: text });
        
        sb.from("messages").insert({ 
          product_id: productId, 
          sender_pi_id: currentUser.uid, 
          receiver_pi_id: currentChatBuyerId, 
          content: text 
        }).then(({error}) => {
            if(error) { console.error("Error:", error); alert(t('send_error')); }
        });
        return;
    }

    // 2. إذا كان هناك صورة (نحتاج لرفعها أولاً)
    btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i>`;
    btn.disabled = true;
    inp.disabled = true;

    try {
        const options = { maxSizeMB: 0.5, maxWidthOrHeight: 800, useWebWorker: true };
        const compressed = await imageCompression(chatSelectedImage, options);
        const path = `chat/${currentUser.uid}_${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`;
        
        const { error: upErr } = await sb.storage.from("images").upload(path, compressed);
        if(upErr) throw upErr;
        
        const { data } = sb.storage.from("images").getPublicUrl(path);
        const uploadedUrl = data.publicUrl;
        const msgContent = text || "📷 Image";

        renderMsg({ sender_pi_id: currentUser.uid, content: msgContent, image_url: uploadedUrl });

        await sb.from("messages").insert({ 
          product_id: productId, 
          sender_pi_id: currentUser.uid, 
          receiver_pi_id: currentChatBuyerId, 
          content: msgContent,
          image_url: uploadedUrl
        });

        inp.value = "";
        clearChatPreview();
    } catch(e) {
        console.error(e);
        alert(t('send_error'));
    } finally {
        btn.innerHTML = origHTML;
        btn.disabled = false;
        inp.disabled = false;
    }
}

function subscribeToChat() {
  if(chatSubscription) sb.removeChannel(chatSubscription);
  
  chatSubscription = sb.channel(`seller-room-${productId}-${currentChatBuyerId}`)
    .on('postgres_changes', { 
      event: 'INSERT', 
      schema: 'public', 
      table: 'messages', 
      filter: `product_id=eq.${productId}` 
    }, payload => {
       const m = payload.new;
       if(m.sender_pi_id === currentChatBuyerId && m.receiver_pi_id === currentUser.uid) {
         renderMsg(m);
       }
    })
    .subscribe();
}

document.getElementById("msgInput").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    sendMsg();
  }
});


// ==========================================
// وظائف النزاع (Dispute) والصور
// ==========================================
let currentDispute = null; // { orderId, againstId }

function openDisputeModal(orderId, againstId) {
    currentDispute = { orderId, againstId };
    document.getElementById('disp-order-id').innerText = orderId.substring(0, 8).toUpperCase();
    document.getElementById('disp-prod-name').innerText = globalProductName;
    document.getElementById('disputeReason').value = '';
    
    disputeFiles = [];
    updateDisputePreviews();
    document.getElementById('disputeModal').style.display = 'flex';
}

function closeDisputeModal() {
    document.getElementById('disputeModal').style.display = 'none';
    currentDispute = null;
    disputeFiles = [];
}

// معالجة صور النزاع
function handleDisputeImages(input) {
    if(!input.files) return;
    const newFiles = Array.from(input.files);
    if(disputeFiles.length + newFiles.length > 3) {
        alert(t('max_3_images')); 
        return;
    }
    disputeFiles = [...disputeFiles, ...newFiles];
    updateDisputePreviews();
    input.value = "";
}

function updateDisputePreviews() {
    const container = document.getElementById('dispute-image-previews');
    container.innerHTML = "";
    disputeFiles.forEach((file, index) => {
        const url = URL.createObjectURL(file);
        container.innerHTML += `
            <div class="preview-box">
                <img src="${url}">
                <button onclick="removeDisputeImage(${index})"><i class="fa-solid fa-xmark"></i></button>
            </div>
        `;
    });
}

function removeDisputeImage(idx) {
    disputeFiles.splice(idx, 1);
    updateDisputePreviews();
}

async function submitDispute() {
    const reasonInput = document.getElementById('disputeReason').value.trim();
    if(!reasonInput) return alert(t('empty_reason'));

    // 💡 هنا نضيف التوضيح للأدمن أن الشكوى مقدمة من البائع بناءً على اللغة
    const rolePrefix = currentLang === 'ar' ? "[شكوى من البائع] - " : "[Complaint from Seller] - ";
    const finalReason = rolePrefix + reasonInput;

    const btn = document.getElementById('submitDisputeBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> ${t('updating')}`;
    btn.disabled = true;

    try {
        // 1. رفع الصور إذا وجدت
        let uploadedUrls = [];
        if(disputeFiles.length > 0) {
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> ${t('uploading_image')}`;
            const options = { maxSizeMB: 0.8, maxWidthOrHeight: 1200, useWebWorker: true };
            
            for(const file of disputeFiles) {
                const compressed = await imageCompression(file, options);
                const path = `disputes/${currentUser.uid}_${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`;
                
                const { error: upErr } = await sb.storage.from("images").upload(path, compressed);
                if(upErr) throw upErr;
                
                const { data } = sb.storage.from("images").getPublicUrl(path);
                uploadedUrls.push(data.publicUrl);
            }
        }

        // 2. إرسال النزاع لقاعدة البيانات مع الصور
        const { error } = await sb.from('disputes').insert({
            escrow_id: currentDispute.orderId,
            product_id: productId,
            complainer_pi_id: currentUser.uid,
            against_pi_id: currentDispute.againstId,
            reason: finalReason,
            images: uploadedUrls.length > 0 ? uploadedUrls : null // حفظ المصفوفة في DB
        });

        if(error) throw error;

        alert(t('dispute_success'));
        closeDisputeModal();
    } catch(err) {
        console.error(err);
        alert(t('update_error'));
    } finally {
        btn.innerHTML = origText;
        btn.disabled = false;
    }
}
</script>
