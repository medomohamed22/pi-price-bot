<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>الدفع الآمن - Deal Way</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script defer src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
/* --- التصميم (كما هو بدون تغيير) --- */
:root {
  --primary: #6366F1; --primary-dark: #4F46E5; --primary-light: #818CF8;
  --accent: #F59E0B; --bg-body: #F8FAFC; --surface: #FFFFFF;
  --text-main: #0F172A; --text-muted: #64748B; --success: #10B981;
  --border: #E2E8F0; --radius-lg: 16px; --radius-xl: 24px;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Tajawal', sans-serif; background: var(--bg-body); color: var(--text-main); line-height: 1.6; }
.container { width: min(100%, 800px); margin: 0 auto; padding: 16px; padding-bottom: 80px; }

.btn { border: none; cursor: pointer; border-radius: var(--radius-lg); padding: 14px 24px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; width: 100%; transition: all 0.3s; }
.btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; }
.btn-success { background: linear-gradient(135deg, var(--success) 0%, #059669 100%); color: white; }
.btn-gold { background: linear-gradient(135deg, var(--accent) 0%, #D97706 100%); color: white; }
.btn-ghost { background: white; border: 1px solid var(--border); color: var(--text-muted); }

.header { background: white; padding: 16px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
.back-btn { background: none; border: none; font-size: 20px; color: var(--text-main); cursor: pointer; }
.header-title { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--primary); }

.card { background: white; border-radius: var(--radius-xl); padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: var(--shadow-sm); }

.stepper { display: flex; justify-content: space-between; position: relative; margin-bottom: 10px; }
.stepper::before { content: ''; position: absolute; top: 20px; left: 30px; right: 30px; height: 3px; background: var(--border); z-index: 1; }
.step { display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 2; width: 25%; }
.step-icon { width: 40px; height: 40px; border-radius: 50%; background: white; border: 3px solid var(--border); display: grid; place-items: center; font-size: 16px; color: var(--text-muted); transition: all 0.3s; }
.step.active .step-icon { border-color: var(--primary); background: var(--primary); color: white; box-shadow: 0 0 15px rgba(99,102,241,0.4); }
.step.completed .step-icon { border-color: var(--success); background: var(--success); color: white; }
.step-text { font-size: 12px; font-weight: 700; color: var(--text-muted); text-align: center; }
.step.active .step-text { color: var(--primary); }

.product-summary { display: flex; gap: 16px; align-items: center; }
.product-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; border: 1px solid var(--border); }
.product-details h3 { font-size: 16px; margin-bottom: 4px; }
.price-tag { background: #FEF3C7; color: #92400E; padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 14px; display: inline-block; }

.chat-box { background: var(--bg-body); border-radius: var(--radius-lg); padding: 16px; height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border); margin-bottom: 12px; scroll-behavior: smooth;}
.bubble { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word;}
.bubble.me { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.bubble.other { background: white; border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
.chat-input-group { display: flex; gap: 10px; }
.chat-input { flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-lg); font-family: inherit; outline: none; }
.chat-input:focus { border-color: var(--primary); }
.send-btn { background: var(--primary); color: white; border: none; width: 50px; border-radius: var(--radius-lg); cursor: pointer; }
</style>
</head>
<body>

<header class="header">
  <button class="back-btn" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-right"></i></button>
  <div class="header-title"><i class="fa-solid fa-shield-halved"></i> نظام الوسيط الآمن</div>
</header>

<div class="container">
  
  <div class="card product-summary">
    <img id="escrow-img" src="https://placehold.co/400x400/f1f5f9/94a3b8?text=Loading..." class="product-img" alt="Product">
    <div class="product-details">
      <h3 id="escrow-title">جاري التحميل...</h3>
      <div class="price-tag"><span id="escrow-price">0</span> π</div>
      <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">البائع: <span id="escrow-seller">...</span></div>
    </div>
  </div>

  <div class="card">
    <div class="stepper" id="stepper-container">
      <div class="step active" id="step-1">
        <div class="step-icon"><i class="fa-solid fa-cart-shopping"></i></div>
        <div class="step-text">طلب الشراء</div>
      </div>
      <div class="step" id="step-2">
        <div class="step-icon"><i class="fa-solid fa-lock"></i></div>
        <div class="step-text">تجميد الرصيد</div>
      </div>
      <div class="step" id="step-3">
        <div class="step-icon"><i class="fa-solid fa-truck-fast"></i></div>
        <div class="step-text">تم الشحن</div>
      </div>
      <div class="step" id="step-4">
        <div class="step-icon"><i class="fa-solid fa-check-double"></i></div>
        <div class="step-text">مكتمل</div>
      </div>
    </div>
  </div>

  <div class="card" id="action-area" style="text-align: center;">
    <p style="color: var(--text-muted); margin-bottom: 15px; font-size: 14px;" id="action-hint">جاري التحقق من حالة المعاملة...</p>
    <div id="action-buttons">
      <button class="btn btn-ghost" disabled><i class="fa-solid fa-circle-notch fa-spin"></i> يرجى الانتظار</button>
    </div>
  </div>

  <div class="card" style="padding: 16px;">
    <h3 style="font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
      <i class="fa-solid fa-comments" style="color: var(--primary);"></i> تواصل مع <span id="chat-partner-name">الطرف الآخر</span>
    </h3>
    <div class="chat-box" id="escrow-chat">
       <div style="text-align:center; color:var(--text-light); font-size:12px; margin-top:20px;">الرسائل مشفرة ومحفوظة لحماية حقوق الطرفين</div>
    </div>
    <div class="chat-input-group">
      <input type="text" id="escrow-msg-input" class="chat-input" placeholder="اكتب رسالة بخصوص الاستلام...">
      <button class="send-btn" onclick="sendEscrowMsg()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://ssvyxrtyvdxxojmunrcv.supabase.co";
const SUPABASE_KEY = "sb_publishable_8egOM2-lT9J6kPQTbluC4w_8YHtB4K3"; 
const API_BASE = "/.netlify/functions"; 

let sb; 
let currentUser = null;
let currentProduct = null;
let currentEscrow = null; 
let userRole = ''; 
let otherUserId = ''; // معرف الطرف الآخر في الشات
let chatSubscription = null;

let isPaymentAlertShown = false; 

const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('productId');

document.addEventListener("DOMContentLoaded", async () => {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  
  if(!productId) { 
    alert("رقم المنتج مفقود"); 
    window.location.href = 'index.html'; 
    return; 
  }

  await initPiUser(); 
  await loadEscrowData();
});

async function initPiUser() {
  try {
    if(typeof Pi !== 'undefined') {
        Pi.init({ version: "2.0", sandbox: false });
        const auth = await Pi.authenticate(["username", "payments"], (payment) => console.log(payment));
        currentUser = { uid: auth.user.uid, username: auth.user.username };
    }
  } catch(e) { 
    console.log("فشل تسجيل الدخول عبر Pi، سيتم استخدام حساب اختباري.", e); 
  }

  if(!currentUser) {
      currentUser = { uid: "test_buyer_123", username: "TestBuyer" }; 
  }
}

async function loadEscrowData() {
  try {
    const { data: prod, error: prodError } = await sb.from("products").select("*").eq("id", productId).single();
    
    if (prodError || !prod) {
      document.getElementById('action-hint').innerText = "لم يتم العثور على المنتج!";
      document.getElementById('action-buttons').innerHTML = '';
      return;
    }

    currentProduct = prod;
    userRole = (currentUser.uid === prod.seller_pi_id) ? 'SELLER' : 'BUYER';
    
    const imgUrl = (prod.images && prod.images.length > 0) ? prod.images[0] : (prod.image_url || "https://placehold.co/400x400/f1f5f9/94a3b8?text=No+Image");
    document.getElementById('escrow-img').src = imgUrl;
    document.getElementById('escrow-title').innerText = prod.name;
    document.getElementById('escrow-price').innerText = prod.price;
    document.getElementById('escrow-seller').innerText = prod.seller_username || "غير معروف";

    let escrowData = null;
    try {
        let query = sb.from("escrow_transactions").select("*").eq("product_id", productId).order("created_at", { ascending: false }).limit(1);
        
        // جلب المعاملة بناءً على دور المستخدم الحالي
        if(userRole === 'BUYER') {
            query = query.eq("buyer_pi_id", currentUser.uid);
        } else {
            query = query.eq("seller_pi_id", currentUser.uid);
        }

        const { data: escrowList, error: escrowError } = await query;
          
        if(!escrowError && escrowList && escrowList.length > 0) {
            escrowData = escrowList[0];
        }
    } catch(err) { console.log(err); }
      
    if(escrowData) {
        currentEscrow = escrowData;
        // تحديد الطرف الآخر بدقة
        otherUserId = (userRole === 'BUYER') ? currentProduct.seller_pi_id : currentEscrow.buyer_pi_id;
        document.getElementById('chat-partner-name').innerText = (userRole === 'BUYER') ? "البائع" : "المشتري";
        
        // تفعيل الشات بما أن المعاملة/الطرف الآخر معروف
        loadMessages();
        subscribeToChat();
    } else {
        currentEscrow = { status: 'PENDING' };
        if(userRole === 'BUYER') {
           otherUserId = currentProduct.seller_pi_id;
           document.getElementById('chat-partner-name').innerText = "البائع";
           loadMessages();
           subscribeToChat();
        } else {
           // البائع ليس لديه مشتري بعد لهذا الطلب المفتوح
           document.getElementById('chat-partner-name').innerText = "المشتري (غير متوفر بعد)";
           document.getElementById('escrow-msg-input').disabled = true;
        }
    }

    updateUI();
  } catch (err) {
    console.error(err);
  }
}

function updateUI() {
  const status = currentEscrow.status;
  const hint = document.getElementById('action-hint');
  const btns = document.getElementById('action-buttons');
  
  if(status === 'FUNDED') { setStep(2); }
  else if(status === 'SHIPPED') { setStep(3); }
  else if(status === 'COMPLETED') { setStep(4); }
  else { setStep(1); } 

  if(userRole === 'BUYER') {
      if(status === 'PENDING') {
          hint.innerText = "قم بالدفع الآن. سيتم تجميد رصيدك في محفظة الموقع ولن يصل للبائع حتى تؤكد الاستلام.";
          btns.innerHTML = `<button class="btn btn-gold" onclick="payToEscrow()"><i class="fa-brands fa-pied-piper-alt"></i> دفع وتجميد ${currentProduct.price} Pi</button>`;
      } 
      else if(status === 'FUNDED') {
          hint.innerText = "تم تجميد رصيدك بنجاح. ننتظر من البائع شحن المنتج.";
          btns.innerHTML = `<button class="btn btn-ghost" disabled><i class="fa-solid fa-clock"></i> في انتظار الشحن</button>`;
      }
      else if(status === 'SHIPPED') {
          hint.innerText = "البائع قام بشحن المنتج. اضغط هنا فقط عند استلامك للمنتج سليماً.";
          btns.innerHTML = `<button class="btn btn-success" onclick="confirmReceipt()"><i class="fa-solid fa-handshake"></i> تأكيد استلام المنتج</button>`;
      }
      else if(status === 'COMPLETED') {
          hint.innerText = "تمت المعاملة بنجاح وتم تحويل الرصيد للبائع.";
          btns.innerHTML = `<button class="btn btn-ghost" disabled><i class="fa-solid fa-check"></i> معاملة مكتملة</button>`;
      }
  } 
  else if (userRole === 'SELLER') {
      if(status === 'PENDING') {
          hint.innerText = "المشتري لم يقم بالدفع وتجميد الرصيد بعد. لا تقم بشحن المنتج.";
          btns.innerHTML = `<button class="btn btn-ghost" disabled><i class="fa-solid fa-clock"></i> في انتظار دفع المشتري</button>`;
      }
      else if(status === 'FUNDED') {
          hint.innerText = "الرصيد مجمد الآن في الموقع بأمان. يرجى شحن وتسليم المنتج للمشتري.";
          btns.innerHTML = `<button class="btn btn-primary" onclick="markAsShipped()"><i class="fa-solid fa-box-open"></i> تأكيد شحن المنتج</button>`;
      }
      else if(status === 'SHIPPED') {
          hint.innerText = "لقد قمت بتأكيد الشحن. ننتظر تأكيد المشتري للاستلام لتحويل الرصيد لمحفظتك.";
          btns.innerHTML = `<button class="btn btn-ghost" disabled><i class="fa-solid fa-clock"></i> في انتظار تأكيد المشتري</button>`;
      }
      else if(status === 'COMPLETED') {
          hint.innerText = "المشتري أكد الاستلام وتمت المعاملة بنجاح.";
          btns.innerHTML = `<button class="btn btn-ghost" disabled><i class="fa-solid fa-check"></i> معاملة مكتملة</button>`;
      }
  }
}

function setStep(stepNumber) {
  document.querySelectorAll('.step').forEach((el, index) => {
      if(index < stepNumber) { el.classList.add('completed'); el.classList.remove('active'); }
      else if(index === stepNumber - 1) { el.classList.add('active'); el.classList.remove('completed'); }
      else { el.classList.remove('active', 'completed'); }
  });
}

// ---- وظائف الشات الخاصة بنظام الوسيط ----

async function loadMessages() {
  if(!otherUserId) return;
  const box = document.getElementById("escrow-chat");
  
  const { data } = await sb.from("messages")
    .select("*")
    .eq("product_id", productId)
    .or(`and(sender_pi_id.eq.${currentUser.uid},receiver_pi_id.eq.${otherUserId}),and(sender_pi_id.eq.${otherUserId},receiver_pi_id.eq.${currentUser.uid})`)
    .order("created_at",{ascending:true});
    
  if(data && data.length > 0) {
    box.innerHTML = ""; // مسح رسالة "الرسائل مشفرة"
    data.forEach(m => renderMsg(m));
  }
}

function renderMsg(m){
    const div = document.createElement("div"); 
    const isMe = m.sender_pi_id === currentUser.uid;
    div.className = `bubble ${isMe ? 'me':'other'}`; 
    div.innerText = m.content;
    const box = document.getElementById("escrow-chat"); 
    box.appendChild(div); 
    box.scrollTop = box.scrollHeight;
}

async function sendEscrowMsg(){
    const inp = document.getElementById("escrow-msg-input"); 
    const text = inp.value.trim();
    if(!text || !otherUserId) return;
    
    // مسح الحقل ورسم الرسالة فوراً للمستخدم لسرعة الاستجابة (Optimistic UI)
    inp.value = "";
    renderMsg({ sender_pi_id: currentUser.uid, content: text });
    
    const { error } = await sb.from("messages").insert({ 
      product_id: productId, 
      sender_pi_id: currentUser.uid, 
      receiver_pi_id: otherUserId, 
      content: text 
    });
    
    if(error) console.error("Error sending message:", error);
}

function subscribeToChat() {
  if(chatSubscription) sb.removeChannel(chatSubscription);
  
  chatSubscription = sb.channel(`escrow-room-${productId}-${currentUser.uid}`)
    .on('postgres_changes', { 
      event: 'INSERT', 
      schema: 'public', 
      table: 'messages', 
      filter: `product_id=eq.${productId}` 
    }, payload => {
       const m = payload.new;
       // نرسم الرسالة فقط إذا كانت قادمة من الطرف الآخر (لأن رسالتنا رسمناها مسبقاً وقت الضغط)
       if(m.sender_pi_id === otherUserId && m.receiver_pi_id === currentUser.uid) {
         renderMsg(m);
       }
    })
    .subscribe();
}

// السماح بالإرسال عند الضغط على زر Enter
document.getElementById("escrow-msg-input").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    sendEscrowMsg();
  }
});

// ---- باقي الوظائف الخاصة بالدفع (كما هي) ----

async function payToEscrow() {
  if (typeof Pi === 'undefined') { alert("يرجى فتح الموقع من متصفح Pi Browser."); return; }
  const btn = document.querySelector('.btn-gold');
  btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> جاري فتح محفظة Pi...`;
  btn.disabled = true;
  isPaymentAlertShown = false;

  try {
    const paymentData = {
      amount: parseFloat(currentProduct.price),
      memo: `شراء آمن لمنتج: ${currentProduct.name}`,
      metadata: { productId: currentProduct.id, type: "escrow", buyerId: currentUser.uid }
    };

    const paymentCallbacks = {
      onReadyForServerApproval: async (paymentId) => {
        try {
          await fetch(`${API_BASE}/approve`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ paymentId }) });
        } catch (e) { if(!isPaymentAlertShown) alert("خطأ في الاتصال."); updateUI(); }
      },
      onReadyForServerCompletion: async (paymentId, txid) => {
        try {
          const res = await fetch(`${API_BASE}/complete`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ paymentId, txid }) });
          const json = await res.json();
          if(res.ok && (json.completed || json.success)) {
            if(!isPaymentAlertShown) { alert("تم الدفع وتجميد الرصيد بنجاح!"); isPaymentAlertShown = true; }
            document.getElementById('action-hint').innerText = "جاري تحديث حالة الطلب...";
            await loadEscrowData(); 
          } else { if(!isPaymentAlertShown) alert("حدث خطأ."); updateUI(); }
        } catch (err) { if(!isPaymentAlertShown) alert("خطأ في الاتصال."); updateUI(); }
      },
      onCancel: (paymentId) => { updateUI(); },
      onError: (error, payment) => { if(!isPaymentAlertShown) alert("حدث خطأ."); updateUI(); }
    };
    Pi.createPayment(paymentData, paymentCallbacks);
  } catch(err) { if(!isPaymentAlertShown) alert("خطأ في تهيئة الدفع."); updateUI(); }
}

async function markAsShipped() {
  const btn = document.querySelector('.btn-primary');
  btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحديث...`;
  btn.disabled = true;
  try {
    const { error } = await sb.from('escrow_transactions').update({ status: 'SHIPPED' }).eq('id', currentEscrow.id);
    if (error) throw error;
    currentEscrow.status = 'SHIPPED';
    updateUI();
  } catch(e) { alert("فشل تحديث الحالة."); updateUI(); }
}

async function confirmReceipt() {
  if(!confirm("هل أنت متأكد أنك استلمت المنتج سليماً؟ لا يمكن التراجع.")) return;
  const btn = document.querySelector('.btn-success');
  btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> جاري التأكيد...`;
  btn.disabled = true;
  try {
    const { error } = await sb.from('escrow_transactions').update({ status: 'COMPLETED' }).eq('id', currentEscrow.id);
    if (error) throw error;
    currentEscrow.status = 'COMPLETED';
    updateUI();
    alert("تم تأكيد الاستلام بنجاح!");
  } catch(e) { alert("فشل تأكيد الاستلام."); updateUI(); }
}
</script>
</body>
</html>
