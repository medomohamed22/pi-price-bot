<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>محفظتي - Deal Way</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script defer src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
:root {
  --primary: #6366F1; --primary-dark: #4F46E5; --primary-light: #818CF8;
  --accent: #F59E0B; --bg-body: #F8FAFC; --surface: #FFFFFF;
  --text-main: #0F172A; --text-muted: #64748B; --success: #10B981;
  --danger: #EF4444; --border: #E2E8F0; --radius-lg: 16px; --radius-xl: 24px;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Tajawal', sans-serif; background: var(--bg-body); color: var(--text-main); line-height: 1.6; padding-bottom: 40px; }
.container { width: min(100%, 800px); margin: 0 auto; padding: 16px; }

.header { background: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow-sm);}
.back-btn { background: none; border: none; font-size: 20px; color: var(--text-main); cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 800; font-family: inherit;}

/* --- بطاقة المحفظة العلوية --- */
.wallet-card { background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%); border-radius: var(--radius-xl); padding: 24px; color: white; margin-bottom: 24px; position: relative; overflow: hidden; box-shadow: 0 10px 25px rgba(15, 23, 42, 0.2); }
.wallet-card::before { content: '\f0d6'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; left: -20px; bottom: -20px; font-size: 150px; opacity: 0.05; transform: rotate(-15deg); }
.balance-label { font-size: 14px; color: #94A3B8; margin-bottom: 4px; font-weight: 600; }
.balance-amount { font-size: 36px; font-weight: 900; color: #FDE047; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }

.pending-box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-lg); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
.pending-box div:first-child { font-size: 13px; color: #CBD5E1; display: flex; align-items: center; gap: 6px; }
.pending-box div:last-child { font-size: 16px; font-weight: 800; color: white; }

/* --- سجل المعاملات --- */
.section-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
.tx-list { display: flex; flex-direction: column; gap: 12px; }
.tx-item { background: white; border-radius: var(--radius-lg); padding: 16px; border: 1px solid var(--border); display: flex; align-items: center; gap: 16px; transition: all 0.3s; box-shadow: var(--shadow-sm); }
.tx-item:hover { transform: translateX(-5px); box-shadow: var(--shadow); border-color: var(--primary-light); }

.tx-icon { width: 48px; height: 48px; border-radius: 50%; display: grid; place-items: center; font-size: 20px; flex-shrink: 0; }
.tx-icon.income { background: #D1FAE5; color: #059669; }
.tx-icon.pending { background: #FEF3C7; color: #D97706; }
.tx-icon.outcome { background: #F1F5F9; color: #64748B; }

.tx-details { flex: 1; overflow: hidden; }
.tx-title { font-weight: 800; font-size: 15px; color: var(--text-main); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-date { font-size: 12px; color: var(--text-muted); }

.tx-amount { font-weight: 900; font-size: 16px; display: flex; flex-direction: column; align-items: flex-end; }
.tx-amount.positive { color: #059669; }
.tx-amount.pending { color: #D97706; }
.tx-amount.negative { color: var(--text-muted); }
.tx-status { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-top: 4px; }
.status-badge.completed { background: #D1FAE5; color: #059669; }
.status-badge.pending { background: #FEF3C7; color: #D97706; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); background: white; border-radius: var(--radius-xl); border: 1px dashed var(--border); }
</style>
</head>
<body>

<header class="header">
  <button class="back-btn" onclick="window.location.href='index.html'">
    <i class="fa-solid fa-arrow-right"></i> حسابي
  </button>
</header>

<div class="container">
  
  <div class="wallet-card">
    <div class="balance-label">الرصيد المتاح (تم الاستلام)</div>
    <div class="balance-amount" id="available-balance">0 <span style="font-size: 24px; color: white;">π</span></div>
    
    <div class="pending-box">
      <div><i class="fa-solid fa-lock" style="color: #FCD34D;"></i> رصيد معلق (قيد الشحن/التسليم)</div>
      <div id="pending-balance">0 π</div>
    </div>
  </div>

  <div class="section-title">
    <i class="fa-solid fa-clock-rotate-left" style="color: var(--primary);"></i> سجل المعاملات
  </div>

  <div id="tx-container" class="tx-list">
    <div class="empty-state">
      <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 30px; color: var(--primary); margin-bottom: 10px;"></i>
      <p>جاري تحميل محفظتك...</p>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://ssvyxrtyvdxxojmunrcv.supabase.co";
const SUPABASE_KEY = "sb_publishable_8egOM2-lT9J6kPQTbluC4w_8YHtB4K3"; 
let sb;
let currentUser = null;

document.addEventListener("DOMContentLoaded", async () => {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  await initPiUser(); 
  await loadWalletData();
});

async function initPiUser() {
  try {
    if(typeof Pi !== 'undefined') {
        Pi.init({ version: "2.0", sandbox: false });
        const auth = await Pi.authenticate(["username", "payments"], (payment) => console.log(payment));
        currentUser = { uid: auth.user.uid, username: auth.user.username };
    }
  } catch(e) { console.log("Pi Login Failed", e); }

  if(!currentUser) {
      currentUser = { uid: "test_seller_123", username: "TestUser" }; // للمتصفح العادي
  }
}

async function loadWalletData() {
  const container = document.getElementById('tx-container');

  try {
    // جلب المعاملات التي يكون فيها المستخدم إما بائعاً أو مشترياً، مع جلب اسم المنتج من جدول products
    const { data: txs, error } = await sb.from("escrow_transactions")
      .select("*, products(name)")
      .or(`seller_pi_id.eq.${currentUser.uid},buyer_pi_id.eq.${currentUser.uid}`)
      .order("created_at", { ascending: false });

    if (error) throw error;

    let availableBalance = 0;
    let pendingBalance = 0;
    
    if (!txs || txs.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-receipt" style="font-size: 40px; margin-bottom: 10px; color: var(--border);"></i>
          <h3>لا توجد معاملات</h3>
          <p>لم تقم بأي عمليات بيع أو شراء عبر نظام الوسيط حتى الآن.</p>
        </div>
      `;
      return;
    }

    container.innerHTML = "";

    txs.forEach(tx => {
      const isSeller = (tx.seller_pi_id === currentUser.uid);
      const productName = tx.products ? tx.products.name : "منتج غير معروف";
      const dateStr = new Date(tx.created_at).toLocaleDateString('ar-EG', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
      
      let iconClass, iconName, amountClass, sign, titleText, statusHtml;

      // حساب الأرصدة للبائع
      if (isSeller) {
          if (tx.status === 'COMPLETED') {
              availableBalance += parseFloat(tx.amount);
              iconClass = "income"; iconName = "fa-arrow-down"; amountClass = "positive"; sign = "+";
              titleText = `بيع: ${productName}`;
              statusHtml = `<span class="tx-status status-badge completed">مكتمل وتم الاستلام</span>`;
          } else {
              // FUNDED أو SHIPPED
              pendingBalance += parseFloat(tx.amount);
              iconClass = "pending"; iconName = "fa-hourglass-half"; amountClass = "pending"; sign = "+";
              titleText = `بيع معلق: ${productName}`;
              statusHtml = `<span class="tx-status status-badge pending">رصيد محجوز مؤقتاً</span>`;
          }
      } 
      // المشتري (تظهر كمدفوعات صادرة)
      else {
          iconClass = "outcome"; iconName = "fa-arrow-up"; amountClass = "negative"; sign = "-";
          titleText = `شراء: ${productName}`;
          if (tx.status === 'COMPLETED') {
              statusHtml = `<span class="tx-status status-badge completed" style="background:#F1F5F9; color:#64748B;">عملية مكتملة</span>`;
          } else {
              statusHtml = `<span class="tx-status status-badge pending">في انتظار تسليمك</span>`;
          }
      }

      // رسم بطاقة المعاملة
      container.innerHTML += `
        <div class="tx-item">
          <div class="tx-icon ${iconClass}"><i class="fa-solid ${iconName}"></i></div>
          <div class="tx-details">
            <div class="tx-title">${titleText}</div>
            <div class="tx-date">${dateStr}</div>
          </div>
          <div class="tx-amount ${amountClass}">
            <span>${sign}${tx.amount} π</span>
            ${statusHtml}
          </div>
        </div>
      `;
    });

    // تحديث الأرصدة في الأعلى
    document.getElementById('available-balance').innerHTML = `${availableBalance.toFixed(2)} <span style="font-size: 24px; color: white;">π</span>`;
    document.getElementById('pending-balance').innerHTML = `${pendingBalance.toFixed(2)} π`;

  } catch (err) {
    console.error(err);
    container.innerHTML = `
      <div class="empty-state">
        <p style="color: var(--danger);">حدث خطأ في جلب بيانات المحفظة.</p>
      </div>
    `;
  }
}
</script>
</body>
</html>
