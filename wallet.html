<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>محفظتي - Deal Way</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script defer src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
:root {
  --primary: #6366F1; --primary-dark: #4F46E5; --primary-light: #818CF8;
  --accent: #F59E0B; --bg-body: #F8FAFC; --surface: #FFFFFF;
  --text-main: #0F172A; --text-muted: #64748B; --success: #10B981;
  --danger: #EF4444; --border: #E2E8F0; --radius-lg: 16px; --radius-xl: 24px;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Tajawal', sans-serif; background: var(--bg-body); color: var(--text-main); line-height: 1.6; padding-bottom: 40px; }
.container { width: min(100%, 800px); margin: 0 auto; padding: 16px; }

.header { background: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow-sm);}
.back-btn { background: none; border: none; font-size: 20px; color: var(--text-main); cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 800; font-family: inherit;}

.btn { border: none; cursor: pointer; border-radius: var(--radius-lg); padding: 14px 24px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; width: 100%; transition: all 0.3s; }
.btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; }
.btn-gold { background: linear-gradient(135deg, var(--accent) 0%, #D97706 100%); color: white; }

/* --- المحفظة --- */
.wallet-card { background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%); border-radius: var(--radius-xl); padding: 24px; color: white; margin-bottom: 24px; position: relative; overflow: hidden; box-shadow: 0 10px 25px rgba(15, 23, 42, 0.2); }
.wallet-card::before { content: '\f0d6'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; left: -20px; bottom: -20px; font-size: 150px; opacity: 0.05; transform: rotate(-15deg); }
.balance-label { font-size: 14px; color: #94A3B8; margin-bottom: 4px; font-weight: 600; }
.balance-amount { font-size: 36px; font-weight: 900; color: #FDE047; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }

.pending-box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-lg); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); margin-top: 16px; }
.pending-box div:first-child { font-size: 13px; color: #CBD5E1; display: flex; align-items: center; gap: 6px; }
.pending-box div:last-child { font-size: 16px; font-weight: 800; color: white; }

/* --- السجل --- */
.section-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
.tx-list { display: flex; flex-direction: column; gap: 12px; }
.tx-item { background: white; border-radius: var(--radius-lg); padding: 16px; border: 1px solid var(--border); display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow-sm); }
.tx-icon { width: 48px; height: 48px; border-radius: 50%; display: grid; place-items: center; font-size: 20px; flex-shrink: 0; }
.tx-icon.income { background: #D1FAE5; color: #059669; }
.tx-icon.pending { background: #FEF3C7; color: #D97706; }
.tx-icon.outcome { background: #F1F5F9; color: #64748B; }
.tx-icon.withdraw { background: #FEE2E2; color: #EF4444; }

.tx-details { flex: 1; overflow: hidden; }
.tx-title { font-weight: 800; font-size: 15px; color: var(--text-main); margin-bottom: 4px; }
.tx-date { font-size: 12px; color: var(--text-muted); }
.tx-amount { font-weight: 900; font-size: 16px; display: flex; flex-direction: column; align-items: flex-end; }
.tx-amount.positive { color: #059669; }
.tx-amount.pending { color: #D97706; }
.tx-amount.negative { color: var(--text-muted); }
.tx-amount.withdraw-color { color: #EF4444; }
.tx-status { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-top: 4px; }
.status-badge.completed { background: #D1FAE5; color: #059669; }
.status-badge.pending { background: #FEF3C7; color: #D97706; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); background: white; border-radius: var(--radius-xl); border: 1px dashed var(--border); }

/* --- المودال --- */
.modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 2000; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(8px); animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.sheet { background: white; width: 100%; max-width: 600px; border-radius: var(--radius-xl) var(--radius-xl) 0 0; padding: 28px; animation: slideUp 0.3s ease-out; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid var(--border); }
.close-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--bg-body); color: var(--text-muted); cursor: pointer; display: grid; place-items: center; font-size: 18px; }
.input-box { width: 100%; padding: 16px; border: 2px solid var(--border); border-radius: var(--radius-lg); font-family: inherit; font-size: 15px; font-weight: 700; outline: none; margin-bottom: 16px; color: var(--text-main); transition: all 0.3s;}
.input-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
.input-label { display: block; font-weight: 800; margin-bottom: 8px; color: var(--text-main); font-size: 14px; }

/* صندوق ملخص الرسوم */
.fee-summary-box { background: #F8FAFC; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 20px; display: none; animation: fadeIn 0.3s ease; }
.fee-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
.fee-row.total { font-size: 16px; font-weight: 900; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); color: var(--success); }
</style>
</head>
<body>

<header class="header">
  <button class="back-btn" onclick="window.location.href='index.html'">
    <i class="fa-solid fa-arrow-right"></i> حسابي
  </button>
</header>

<div class="container">
  
  <div class="wallet-card">
    <div class="balance-label">الرصيد المتاح للسحب</div>
    <div class="balance-amount" id="available-balance">0.00 <span style="font-size: 24px; color: white; margin-right: 5px;">π</span></div>
    
    <button class="btn btn-gold" onclick="openWithdrawModal()" style="width: auto; padding: 10px 24px; font-size: 14px; border-radius: 30px;">
      <i class="fa-solid fa-money-bill-transfer"></i> سحب الرصيد لمحفظة Pi
    </button>

    <div class="pending-box">
      <div><i class="fa-solid fa-lock" style="color: #FCD34D;"></i> رصيد معلق (قيد التسليم)</div>
      <div id="pending-balance">0.00 π</div>
    </div>
  </div>

  <div class="section-title">
    <i class="fa-solid fa-clock-rotate-left" style="color: var(--primary);"></i> سجل المعاملات
  </div>

  <div id="tx-container" class="tx-list">
    <div class="empty-state">
      <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 30px; color: var(--primary); margin-bottom: 10px;"></i>
      <p>جاري تحميل محفظتك...</p>
    </div>
  </div>

</div>

<div id="withdrawModal" class="modal" onclick="if(event.target==this) closeWithdrawModal()">
  <div class="sheet">
    <div class="modal-header">
        <h3 style="margin-bottom: 0; font-size: 20px; color: var(--text-main);">سحب الرصيد</h3>
        <button onclick="closeWithdrawModal()" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">الحد الأدنى للسحب هو 1 Pi. يرجى التأكد من عنوان المحفظة لتجنب فقدان العملات.</p>
    
    <label class="input-label">كمية Pi المراد سحبها:</label>
    <input type="number" id="withdrawAmount" class="input-box" placeholder="مثال: 10.5" step="0.1" min="1" style="text-align: center; color: var(--primary); font-size: 18px;" oninput="calculateFee()" />
    
    <div id="fee-summary" class="fee-summary-box">
      <div class="fee-row">
        <span style="color: var(--text-muted);">المبلغ المخصوم من حسابك:</span>
        <span id="summary-requested" style="font-weight: bold; color: var(--text-main);">0.00 π</span>
      </div>
      <div class="fee-row">
        <span style="color: var(--danger);"><i class="fa-solid fa-tags"></i> رسوم المنصة والشبكة:</span>
        <span style="font-weight: bold; color: var(--danger);">-0.05 π</span>
      </div>
      <div class="fee-row total">
        <span>الصافي الواصل لمحفظتك:</span>
        <span id="summary-receive">0.00 π</span>
      </div>
    </div>

    <label class="input-label">عنوان المحفظة المستلمة (Public Key):</label>
    <input type="text" id="withdrawAddress" class="input-box" placeholder="G..." dir="ltr" style="text-align: left; font-family: monospace;" autocomplete="off" autocorrect="off" spellcheck="false" />
    
    <button id="confirmWithdrawBtn" class="btn btn-primary" onclick="submitWithdraw()" style="margin-top: 8px;">
      <i class="fa-solid fa-check"></i> تأكيد السحب
    </button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ssvyxrtyvdxxojmunrcv.supabase.co";
const SUPABASE_KEY = "sb_publishable_8egOM2-lT9J6kPQTbluC4w_8YHtB4K3"; 
const API_BASE = "/.netlify/functions"; 

const PLATFORM_FEE = 0.05;

let sb;
let currentUser = null;
let currentActualBalance = 0; 

document.addEventListener("DOMContentLoaded", async () => {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  await initPiUser(); 
  await loadWalletData();
});

async function initPiUser() {
  try {
    if(typeof Pi !== 'undefined') {
        Pi.init({ version: "2.0", sandbox: false });
        const auth = await Pi.authenticate(["username", "payments"], (payment) => console.log(payment));
        currentUser = { uid: auth.user.uid, username: auth.user.username };
    }
  } catch(e) { console.log("Pi Login Failed", e); }

  if(!currentUser) currentUser = { uid: "test_seller_123", username: "TestUser" };
}

async function loadWalletData() {
  const container = document.getElementById('tx-container');

  try {
    const { data: escrows } = await sb.from("escrow_transactions")
      .select("*, products(name)")
      .or(`seller_pi_id.eq.${currentUser.uid},buyer_pi_id.eq.${currentUser.uid}`);

    const { data: withdrawals } = await sb.from("withdrawals")
      .select("*")
      .eq("user_pi_id", currentUser.uid);

    let allTxs = [];
    let availableBalance = 0;
    let pendingBalance = 0;
    let totalWithdrawn = 0;
    
    if (escrows) {
        escrows.forEach(tx => {
          const isSeller = (tx.seller_pi_id === currentUser.uid);
          if (isSeller) {
              if (tx.status === 'COMPLETED') availableBalance += parseFloat(tx.amount);
              else pendingBalance += parseFloat(tx.amount);
          }
          allTxs.push({
             type: isSeller ? 'sell' : 'buy',
             data: tx,
             date: new Date(tx.created_at)
          });
        });
    }

    if (withdrawals) {
        withdrawals.forEach(w => {
            totalWithdrawn += parseFloat(w.amount);
            allTxs.push({
                type: 'withdraw',
                data: w,
                date: new Date(w.created_at)
            });
        });
    }

    currentActualBalance = availableBalance - totalWithdrawn;

    document.getElementById('available-balance').innerHTML = `${currentActualBalance.toFixed(2)} <span style="font-size: 24px; color: white;">π</span>`;
    document.getElementById('pending-balance').innerHTML = `${pendingBalance.toFixed(2)} π`;

    allTxs.sort((a, b) => b.date - a.date);

    if (allTxs.length === 0) {
      container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-receipt" style="font-size: 40px; margin-bottom: 10px; color: var(--border);"></i><h3>لا توجد معاملات</h3></div>`;
      return;
    }

    container.innerHTML = "";
    allTxs.forEach(item => {
      const dateStr = item.date.toLocaleDateString('ar-EG', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
      let html = "";
      
      // ✅ معالجة اسم المنتج ليكون ذكياً (في حالة تم حذفه من قاعدة البيانات)
      const productName = item.data.products ? item.data.products.name : "منتج (تم حذفه من الموقع)";

      if(item.type === 'withdraw') {
          html = `
            <div class="tx-item">
              <div class="tx-icon withdraw"><i class="fa-solid fa-money-bill-transfer"></i></div>
              <div class="tx-details">
                <div class="tx-title">سحب رصيد لمحفظة Pi</div>
                <div class="tx-date">${dateStr}</div>
              </div>
              <div class="tx-amount withdraw-color">
                <span>-${item.data.amount} π</span>
                <span class="tx-status status-badge completed" style="background:#FEE2E2; color:#EF4444;">مكتمل</span>
              </div>
            </div>`;
      } 
      else if(item.type === 'sell') {
          const tx = item.data;
          const isCompleted = tx.status === 'COMPLETED';
          html = `
            <div class="tx-item">
              <div class="tx-icon ${isCompleted ? 'income' : 'pending'}"><i class="fa-solid ${isCompleted ? 'fa-arrow-down' : 'fa-hourglass-half'}"></i></div>
              <div class="tx-details">
                <div class="tx-title">بيع: ${productName}</div>
                <div class="tx-date">${dateStr}</div>
              </div>
              <div class="tx-amount ${isCompleted ? 'positive' : 'pending'}">
                <span>+${tx.amount} π</span>
                <span class="tx-status status-badge ${isCompleted ? 'completed' : 'pending'}">${isCompleted ? 'مكتمل' : 'معلق'}</span>
              </div>
            </div>`;
      }
      else if(item.type === 'buy') {
          const tx = item.data;
          html = `
            <div class="tx-item">
              <div class="tx-icon outcome"><i class="fa-solid fa-arrow-up"></i></div>
              <div class="tx-details">
                <div class="tx-title">شراء: ${productName}</div>
                <div class="tx-date">${dateStr}</div>
              </div>
              <div class="tx-amount negative">
                <span>-${tx.amount} π</span>
                <span class="tx-status status-badge completed" style="background:#F1F5F9; color:#64748B;">مدفوع للوسيط</span>
              </div>
            </div>`;
      }
      container.innerHTML += html;
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = `<div class="empty-state"><p style="color: var(--danger);">حدث خطأ في جلب البيانات.</p></div>`;
  }
}

function openWithdrawModal() { 
  document.getElementById('withdrawAmount').value = '';
  document.getElementById('withdrawAddress').value = '';
  document.getElementById('fee-summary').style.display = 'none'; 
  document.getElementById('withdrawModal').style.display = 'flex'; 
}

function closeWithdrawModal() { document.getElementById('withdrawModal').style.display = 'none'; }

function calculateFee() {
    const inputVal = document.getElementById('withdrawAmount').value;
    const amount = parseFloat(inputVal);
    const summaryBox = document.getElementById('fee-summary');
    const reqSpan = document.getElementById('summary-requested');
    const recSpan = document.getElementById('summary-receive');

    if(amount && amount > PLATFORM_FEE) {
        summaryBox.style.display = 'block';
        reqSpan.innerText = amount.toFixed(2) + ' π';
        
        let net = amount - PLATFORM_FEE;
        recSpan.innerText = net.toFixed(2) + ' π';

        if(amount > currentActualBalance) {
            reqSpan.style.color = 'var(--danger)';
        } else {
            reqSpan.style.color = 'var(--text-main)';
        }
    } else {
        summaryBox.style.display = 'none';
    }
}

async function submitWithdraw() {
    const amountInput = document.getElementById('withdrawAmount').value;
    const addressInput = document.getElementById('withdrawAddress').value.trim();
    
    const amount = parseFloat(amountInput);

    if(!amount || amount < 1) return alert("الحد الأدنى للسحب هو 1 Pi");
    if(amount > currentActualBalance) return alert("الرصيد المطلوب أكبر من رصيدك المتاح!");
    if(!addressInput) return alert("يرجى إدخال عنوان المحفظة المستلمة.");
    if(addressInput.length < 40 || !addressInput.startsWith('G')) return alert("يرجى إدخال عنوان محفظة Pi صحيح (يبدأ بحرف G).");

    const netAmount = (amount - PLATFORM_FEE).toFixed(2);
    if(!confirm(`سيتم خصم ${amount} من رصيدك، وسيصلك ${netAmount} Pi بعد خصم الرسوم. هل تريد المتابعة؟`)) return;

    const btn = document.getElementById('confirmWithdrawBtn');
    btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> جاري المعالجة...`;
    btn.disabled = true;

    try {
        const res = await fetch(`${API_BASE}/withdraw`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                uid: currentUser.uid, 
                amount: amount,
                address: addressInput 
            })
        });
        
        const data = await res.json();

        if(res.ok && data.success) {
            alert("تم تحويل الرصيد إلى محفظتك بنجاح!");
            closeWithdrawModal();
            btn.innerHTML = `<i class="fa-solid fa-check"></i> تأكيد السحب`;
            btn.disabled = false;
            await loadWalletData();
        } else {
            throw new Error(data.error || "حدث خطأ غير معروف");
        }
    } catch(err) {
        console.error(err);
        alert("فشل السحب: " + err.message);
        btn.innerHTML = `<i class="fa-solid fa-check"></i> تأكيد السحب`;
        btn.disabled = false;
    }
}
</script>
</body>
</html>
